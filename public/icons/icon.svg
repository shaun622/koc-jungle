<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: same dark navy gradient as the original mark. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2330"/>
      <stop offset="100%" stop-color="#0e1219"/>
    </linearGradient>
    <!-- Paddle face: warm gold gradient — top-down so the lower
         half sits visually on the dark base. -->
    <linearGradient id="paddleGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbcf5f"/>
      <stop offset="60%" stop-color="#f1b843"/>
      <stop offset="100%" stop-color="#b9842a"/>
    </linearGradient>
    <!-- Handle: slightly darker gold so the face reads as the focal element. -->
    <linearGradient id="handleGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d39a30"/>
      <stop offset="100%" stop-color="#85601c"/>
    </linearGradient>
    <!-- Ball: lime sphere with a soft highlight. -->
    <radialGradient id="ball" cx="0.35" cy="0.32" r="0.85">
      <stop offset="0%" stop-color="#e8ffb0"/>
      <stop offset="35%" stop-color="#c6f84e"/>
      <stop offset="100%" stop-color="#7dba1f"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft radial glow behind the action -->
  <circle cx="232" cy="240" r="200" fill="#f1b843" opacity="0.08"/>

  <!-- Paddle, tilted ~15° counter-clockwise so it reads as mid-swing. -->
  <g transform="translate(256 280) rotate(-15) translate(-256 -280)">
    <!-- Handle (drawn first so the face sits on top of it) -->
    <rect x="234" y="380" width="44" height="120" rx="14"
          fill="url(#handleGold)" stroke="#5a3f10" stroke-width="6"/>
    <!-- Grip wraps -->
    <line x1="240" y1="408" x2="272" y2="408" stroke="#5a3f10" stroke-width="3" opacity="0.5"/>
    <line x1="240" y1="436" x2="272" y2="436" stroke="#5a3f10" stroke-width="3" opacity="0.5"/>
    <line x1="240" y1="464" x2="272" y2="464" stroke="#5a3f10" stroke-width="3" opacity="0.5"/>

    <!-- Throat connecting handle to face -->
    <path d="M 230 380 L 220 360 L 292 360 L 282 380 Z"
          fill="url(#handleGold)" stroke="#5a3f10" stroke-width="6"/>

    <!-- Paddle face — tall rounded rectangle (padel paddle shape) -->
    <rect x="148" y="80" width="216" height="290" rx="80"
          fill="url(#paddleGold)" stroke="#5a3f10" stroke-width="8"/>

    <!-- Drilled holes pattern (padel signature) -->
    <g fill="#5a3f10" opacity="0.85">
      <!-- Row 1 -->
      <circle cx="200" cy="150" r="9"/>
      <circle cx="240" cy="140" r="9"/>
      <circle cx="280" cy="140" r="9"/>
      <circle cx="320" cy="150" r="9"/>
      <!-- Row 2 -->
      <circle cx="186" cy="190" r="9"/>
      <circle cx="220" cy="184" r="9"/>
      <circle cx="256" cy="180" r="9"/>
      <circle cx="292" cy="184" r="9"/>
      <circle cx="326" cy="190" r="9"/>
      <!-- Row 3 -->
      <circle cx="186" cy="234" r="9"/>
      <circle cx="220" cy="228" r="9"/>
      <circle cx="256" cy="224" r="9"/>
      <circle cx="292" cy="228" r="9"/>
      <circle cx="326" cy="234" r="9"/>
      <!-- Row 4 -->
      <circle cx="186" cy="278" r="9"/>
      <circle cx="220" cy="272" r="9"/>
      <circle cx="256" cy="270" r="9"/>
      <circle cx="292" cy="272" r="9"/>
      <circle cx="326" cy="278" r="9"/>
      <!-- Row 5 -->
      <circle cx="200" cy="318" r="9"/>
      <circle cx="240" cy="324" r="9"/>
      <circle cx="280" cy="324" r="9"/>
      <circle cx="320" cy="318" r="9"/>
    </g>
  </g>

  <!-- Ball, positioned upper-right as if just struck off the paddle face.
       Drawn after the paddle so it sits on top. -->
  <g>
    <circle cx="380" cy="130" r="56" fill="url(#ball)" stroke="#5a7d12" stroke-width="6"/>
    <!-- Padel ball seam (curved line) -->
    <path d="M 332 130 Q 380 90 428 130" fill="none" stroke="#5a7d12" stroke-width="4" opacity="0.55"/>
    <!-- Bright highlight -->
    <ellipse cx="358" cy="108" rx="14" ry="10" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- Three short speed lines trailing the ball toward the paddle face,
       suggesting it just left the sweet spot. -->
  <g fill="none" stroke="#fbcf5f" stroke-width="6" stroke-linecap="round" opacity="0.65">
    <path d="M 300 170 L 268 200"/>
    <path d="M 296 138 L 256 144"/>
    <path d="M 322 100 L 290 78"/>
  </g>
</svg>
